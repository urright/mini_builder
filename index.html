    /* ==========================================
       AUTH
    ========================================== */
    const CREDENTIALS = { username: 'admin', password: 'Mini728!' };
    const SESSION_KEY = 'mb_session';
    const FAV_KEY = 'mini_builder_favorites';
    const API_BASE = 'http://localhost:3000';
    let isLoggedIn = sessionStorage.getItem(SESSION_KEY) === 'ok';
    
    function handleAuthClick() {
        if (isLoggedIn) { logout(); }
        else { document.getElementById('loginOverlay').classList.add('show'); document.getElementById('loginUser').focus(); }
    }
    
    function handleLogin(e) {
        e.preventDefault();
        const u = document.getElementById('loginUser').value;
        const p = document.getElementById('loginPass').value;
        if (u === CREDENTIALS.username && p === CREDENTIALS.password) {
            sessionStorage.setItem(SESSION_KEY, 'ok');
            isLoggedIn = true;
            document.getElementById('loginOverlay').classList.remove('show');
            updateAuthUI();
            syncAllFavoritesToServer();
        } else {
            document.getElementById('loginError').classList.add('show');
        }
    }
    
    function logout() {
        sessionStorage.removeItem(SESSION_KEY);
        isLoggedIn = false;
        updateAuthUI();
    }
    
    function updateAuthUI() {
        const btn = document.getElementById('authBtn');
        if (isLoggedIn) {
            btn.textContent = '退出';
            btn.classList.add('logged-in');
        } else {
            btn.textContent = '登录';
            btn.classList.remove('logged-in');
        }
        document.querySelectorAll('.fav-btn').forEach(b => {
            if (isLoggedIn) b.classList.add('visible');
            else b.classList.remove('visible');
        });
        if (!isLoggedIn) document.getElementById('syncStatus').textContent = '🔒 未登录';
    }
    
    function setSyncStatus(text, cls) {
        const el = document.getElementById('syncStatus');
        el.textContent = text;
        el.className = 'sync-status ' + cls;
    }
    
    document.getElementById('loginOverlay').addEventListener('click', function(e) {
        if (e.target === this) this.classList.remove('show');
    });
    
    /* ==========================================
       FAVORITES
    ========================================== */
    function getFavorites() { return JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); }
    function saveFavoritesLocal(favs) { localStorage.setItem(FAV_KEY, JSON.stringify(favs)); }
    
    function toggleFav(id, e) {
        if (e) e.preventDefault();
        if (!isLoggedIn) { document.getElementById('loginOverlay').classList.add('show'); return; }
        let favs = getFavorites();
        const action = favs.includes(id) ? 'remove' : 'add';
        if (action === 'add') favs.push(id); else favs = favs.filter(f => f !== id);
        saveFavoritesLocal(favs);
        renderAll();
        syncFavoriteToServer(action, id);
    }
    
    async function syncFavoriteToServer(action, id) {
        try {
            const creds = btoa(CREDENTIALS.username + ':' + CREDENTIALS.password);
            await fetch(API_BASE + '/favorites', {
                method: 'POST',
                headers: { 'Authorization': 'Basic ' + creds, 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, id, timestamp: new Date().toISOString() })
            });
            setSyncStatus('✅ ' + new Date().toLocaleTimeString(), 'synced');
        } catch(err) { setSyncStatus('⚠️ 服务器离线', 'error'); }
    }
    
    async function syncAllFavoritesToServer() {
        const favs = getFavorites();
        if (!favs.length) return;
        try {
            const creds = btoa(CREDENTIALS.username + ':' + CREDENTIALS.password);
            for (const id of favs) {
                await fetch(API_BASE + '/favorites', {
                    method: 'POST',
                    headers: { 'Authorization': 'Basic ' + creds, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'add', id })
                });
            }
            setSyncStatus('✅ ' + favs.length + ' 条收藏已同步', 'synced');
        } catch(err) { setSyncStatus('⚠️ 服务器离线', 'error'); }
    }
    
    /* ==========================================
       TAGS FILTER
    ========================================== */
    let activeTag = '全部';
    
    function getAllTags() {
        const tags = new Set();
        ALL_SOLUTIONS.forEach(s => s.tags.forEach(t => tags.add(t)));
        return ['全部', ...Array.from(tags).sort()];
    }
    
    function buildTagFilter() {
        const container = document.getElementById('tagFilter');
        container.innerHTML = getAllTags().map(tag =>
            `<button class="tag-btn${tag === activeTag ? ' active' : ''}" onclick="setTag('${tag}')">${tag}</button>`
        ).join('');
    }
    
    function setTag(tag) {
        activeTag = tag;
        buildTagFilter();
        renderTable();
    }
    
    /* ==========================================
       RENDER
    ========================================== */
    function filtered() {
        let sols = ALL_SOLUTIONS;
        if (activeTag !== '全部') sols = sols.filter(s => s.tags.includes(activeTag));
        return sols;
    }
    
    function renderCards() {
        const container = document.getElementById('latestCards');
        // Latest 3: sort by date desc, take 3
        const latest = [...ALL_SOLUTIONS].sort((a, b) => b.created.localeCompare(a.created)).slice(0, 3);
        container.innerHTML = latest.map(s => buildCardHTML(s, true)).join('');
    }
    
    function renderTable() {
        const tbody = document.getElementById('solTableBody');
        const sortVal = document.getElementById('sortSelect').value;
        let sols = filtered();
        
        // Sort
        if (sortVal === 'updated-asc') sols.sort((a, b) => a.updated.localeCompare(b.updated));
        else sols.sort((a, b) => b.updated.localeCompare(a.updated)); // default: updated-desc
        
        tbody.innerHTML = sols.map(s => {
            const favs = getFavorites();
            const isFav = favs.includes(s.id);
            return `<tr class="sol-row" onclick="window.location='${s.id}/index.html'">
                <td class="col-title"><a href="${s.id}/index.html" onclick="event.stopPropagation()">${s.title}</a><br><span class="col-desc">${s.desc}</span></td>
                <td class="col-updated">${s.updated}</td>
                <td class="col-fav" onclick="event.stopPropagation()"><button class="fav-btn${isFav ? ' favorited' : ''}${isLoggedIn ? ' visible' : ''}" onclick="toggleFav('${s.id}',event)" title="收藏">${isFav ? '★' : '☆'}</button></td>
            </tr>`;
        }).join('');
    }
    
    function buildCardHTML(s, showFav) {
        const favs = getFavorites();
        const isFav = favs.includes(s.id);
        return `<a href="${s.id}/index.html" class="sol-card">
            <div class="card-head">
                <span class="card-title">${s.title}</span>
                <button class="fav-btn${isFav ? ' favorited' : ''}${isLoggedIn && showFav ? ' visible' : ''}" onclick="toggleFav('${s.id}',event)" title="收藏">${isFav ? '★' : '☆'}</button>
            </div>
            <div class="card-id">📁 ${s.id}/ &nbsp;|&nbsp; 更新: ${s.updated}</div>
            <p class="card-desc">${s.desc}</p>
            <div class="card-tags">${s.tags.map(t => `<span class="tag${t === '可建站' ? ' kanjian' : ''}">${t}</span>`).join('')}</div>
            <div class="card-metrics">${s.metrics.map(m => `<span class="metric">⚡ ${m}</span>`).join('')}</div>
        </a>`;
    }
    
    function renderAll() {
        updateAuthUI();
        renderCards();
        buildTagFilter();
        renderTable();
    }
    
    renderAll();
    </script>
</body>
</html>
